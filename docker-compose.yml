services:

  # ── Data stores ─────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kanflow
      POSTGRES_PASSWORD: kanflow
      POSTGRES_DB: kanflow
    ports:
      - "5432:5432"
    volumes:
      - kanflow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanflow -d kanflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - kanflow_mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Local LLM (Ollama) ───────────────────────────────────────────────────────

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - kanflow_ollama:/root/.ollama
    environment:
      # Allow browser requests from any origin (required for direct fetch from frontend)
      OLLAMA_ORIGINS: "*"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 12
      start_period: 45s
    # Uncomment to enable GPU acceleration (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Pulls the default model on first start; exits cleanly once done.
  ollama-pull:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-llama3.2}"]
    restart: "no"

  # ── Rust API server ──────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://kanflow:kanflow@postgres:5432/kanflow
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: kanflow
      KANFLOW_HOST: 0.0.0.0
      KANFLOW_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: on-failure

  # ── React frontend (Vite build → Nginx) ──────────────────────────────────────
  # Browser uses same-origin `/ollama` → nginx proxies to the ollama service (no CORS).

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_OLLAMA_URL: "/ollama"
        VITE_OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2}"
    ports:
      - "3000:80"
    depends_on:
      - backend
      - ollama
    restart: on-failure

volumes:
  kanflow_pg:
  kanflow_mongo:
  kanflow_ollama:
