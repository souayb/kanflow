server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Ollama from the browser (Docker): same-origin; set VITE_OLLAMA_URL=/ollama at build time.
    location /ollama/ {
        proxy_pass http://ollama:11434/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # SPA fallback — all unknown paths serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets: long cache, immutable (Vite hashes filenames)
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}
